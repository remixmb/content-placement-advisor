<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Content Placement Advisor</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app">
      <header>
        <h1>Content Placement Advisor</h1>
        <p>Choose a content type and taxonomy terms to preview where the content will surface across Yale SOM pages.</p>
      </header>

      <form id="advisor-form" class="advisor-form">
        <div class="form-row">
          <label for="content-type">Content type</label>
          <select id="content-type" required></select>
        </div>

        <fieldset class="taxonomy-fieldset">
          <legend>Taxonomy filters</legend>
          <div class="taxonomy-controls">
            <label for="taxonomy-select">Choose a taxonomy dimension</label>
            <select id="taxonomy-select"></select>
            <button type="button" id="add-taxonomy">Add filter</button>
          </div>
          <p id="taxonomy-helper" class="taxonomy-helper" aria-live="polite"></p>
          <div id="taxonomy-container" class="taxonomy-container"></div>
        </fieldset>

        <button type="submit" class="primary">Evaluate placements</button>
      </form>

      <section id="results-section" class="results">
        <div id="results-summary"></div>
        <div id="results-confirmed"></div>
        <div id="results-limited"></div>
        <div id="results-excluded"></div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
